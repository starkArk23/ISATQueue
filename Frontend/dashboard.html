<!DOCTYPE html>
<html lang="en">
<head>
    <title>ISATQueue - Live Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">ISATQueue</h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="#">ABOUT</a></li>
                    <li><a href="dashboard.html">LIVE DASHBOARD</a></li>
                    <li><a href="#">CONTACT</a></li>
                </ul>
            </div>
        </div>

        <div class="content">
            <div class="main-number">
                <h1>Now <br><span>Serving</span></h1>
                <p class="current-ticket">A-012</p>
                <p class="par">Please proceed to <b>Window 1</b>. <br> 
                Have your requirements ready for faster processing.</p>
            </div>
            
            <div class="form dashboard-card">
                <h2>Queue Status</h2>
                
                <div class="ai-box">
                    <p>Est. Wait Time</p>
                    <span class="timer">18 MINS</span>
                </div>

                <div class="next-list">
                    <div class="row"><span>NEXT:</span> <b>A-013</b></div>
                    <div class="row"><span>FOLLOWING:</span> <b>A-014</b></div>
                    <div class="row"><span>FOLLOWING:</span> <b>A-015</b></div>
                </div>

                <button class="btnn"><a href="index.html">Exit Dashboard</a></button>
            </div>
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
